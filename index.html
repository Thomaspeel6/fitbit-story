<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Watch — A Fitbit Ethical Adventure</title>
<style>
  :root {
    --bg: #f4f1ea;
    --ink: #1c1a16;
    --muted: #5a544a;
    --line: #c9c1b2;
    --accent: #8a2b2b;
    --paper: #fbf9f3;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: "Iowan Old Style", "Palatino Linotype", "Palatino", Georgia, serif;
    font-size: 18px;
    line-height: 1.6;
  }
  .wrap {
    max-width: 660px;
    margin: 0 auto;
    padding: 48px 24px 96px;
  }
  header.site {
    border-bottom: 1px solid var(--line);
    padding-bottom: 16px;
    margin-bottom: 40px;
  }
  header.site .kicker {
    text-transform: uppercase;
    letter-spacing: 0.18em;
    font-size: 11px;
    color: var(--muted);
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
  }
  header.site h1 {
    font-size: 38px;
    margin: 8px 0 4px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  header.site .sub {
    font-style: italic;
    color: var(--muted);
    font-size: 16px;
  }
  .scene {
    background: var(--paper);
    border: 1px solid var(--line);
    margin-bottom: 28px;
    box-shadow: 0 1px 0 rgba(0,0,0,0.03);
  }
  .scene .photo {
    width: 100%;
    height: 220px;
    background-size: cover;
    background-position: center;
    filter: grayscale(35%) contrast(0.95) brightness(0.96);
    border-bottom: 1px solid var(--line);
  }
  .scene .body {
    padding: 28px;
  }
  .scene h2 {
    font-size: 24px;
    margin: 0 0 16px;
    font-weight: 600;
  }
  .scene p {
    margin: 0 0 14px;
  }
  .choices {
    list-style: none;
    padding: 0;
    margin: 24px 0 0;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .choices button {
    width: 100%;
    text-align: left;
    background: transparent;
    border: 1px solid var(--line);
    padding: 14px 16px;
    font-family: inherit;
    font-size: 16px;
    color: var(--ink);
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    line-height: 1.45;
  }
  .choices button:hover {
    background: #efeadc;
    border-color: var(--ink);
  }
  .ending-meta {
    margin-top: 24px;
    padding-top: 16px;
    border-top: 1px dashed var(--line);
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .ending-title {
    letter-spacing: 0.04em;
    color: var(--accent);
    font-size: 13px;
    margin-bottom: 10px;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    text-transform: uppercase;
    font-weight: 600;
  }
  .ending-actions {
    margin-top: 24px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .ending-actions button {
    background: var(--ink);
    color: var(--paper);
    border: none;
    padding: 10px 16px;
    font-family: inherit;
    font-size: 15px;
    cursor: pointer;
  }
  .ending-actions button.secondary {
    background: transparent;
    color: var(--ink);
    border: 1px solid var(--ink);
  }
  .ending-actions button:hover { opacity: 0.88; }
  .reflection h2 {
    font-size: 26px;
    margin: 32px 0 12px;
    font-weight: 600;
  }
  .reflection h3 {
    font-size: 18px;
    margin: 28px 0 8px;
    font-weight: 600;
    color: var(--muted);
  }
  .reflection p { margin: 0 0 16px; }
  .tree {
    font-family: "SF Mono", "Menlo", "Consolas", monospace;
    font-size: 13px;
    line-height: 1.55;
    background: #f4efe3;
    border: 1px solid var(--line);
    padding: 20px 22px;
    margin: 16px 0 24px;
    overflow-x: auto;
  }
  .tree ul {
    list-style: none;
    margin: 0;
    padding: 0 0 0 18px;
    position: relative;
  }
  .tree > ul { padding-left: 0; }
  .tree li {
    position: relative;
    padding: 4px 0 4px 18px;
  }
  .tree > ul > li { padding-left: 0; }
  .tree ul ul li::before {
    content: "";
    position: absolute;
    left: 0;
    top: 0;
    bottom: 50%;
    width: 12px;
    border-left: 1px solid #b8b0a0;
    border-bottom: 1px solid #b8b0a0;
  }
  .tree ul ul li:not(:last-child)::after {
    content: "";
    position: absolute;
    left: 0;
    top: 50%;
    bottom: -4px;
    border-left: 1px solid #b8b0a0;
  }
  .tree .node {
    display: inline-block;
  }
  .tree .decision { font-weight: 600; color: var(--ink); }
  .tree .scene-link { color: var(--ink); }
  .tree .end {
    color: var(--ink);
    font-weight: 500;
  }
  .tree .badge {
    display: inline-block;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 1px 6px;
    border-radius: 2px;
    margin-left: 6px;
    vertical-align: 1px;
    font-weight: 600;
  }
  .badge-positive { background: #d8e5cf; color: #3d5a2b; }
  .badge-uncertain { background: #ece5cf; color: #6a5a2a; }
  .badge-dystopic { background: #e8ccc9; color: #7a2a24; }
  .tree .merge { color: var(--muted); font-style: italic; }
  footer.site {
    margin-top: 60px;
    padding-top: 20px;
    border-top: 1px solid var(--line);
    font-size: 13px;
    color: var(--muted);
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
  }
  @media (max-width: 600px) {
    .wrap { padding: 32px 18px 72px; }
    .scene .photo { height: 170px; }
    .scene .body { padding: 22px 20px; }
    header.site h1 { font-size: 30px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="site">
    <div class="kicker">An Interactive Ethical Adventure</div>
    <h1>The Watch</h1>
    <div class="sub">A story about a Fitbit, a wellness program, and the small prices of being reasonable.</div>
  </header>

  <main id="app"></main>

  <footer class="site">
    By Thomas Peel · Ethics and Technology, NYU · Spring 2026
  </footer>
</div>

<script>
const PHOTO = {
  start:          "https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?w=1200&q=75&auto=format&fit=crop",
  accept:         "https://images.unsplash.com/photo-1722152909289-89d345b9c9a0?w=1200&q=75&auto=format&fit=crop",
  ignore:         "https://images.unsplash.com/photo-1542744173-8e7e53415bb0?w=1200&q=75&auto=format&fit=crop",
  confront:       "https://images.unsplash.com/photo-1606857521015-7f9fcf423740?w=1200&q=75&auto=format&fit=crop",
  game:           "https://images.unsplash.com/photo-1549637642-90187f64f420?w=1200&q=75&auto=format&fit=crop",
  clean_break:    "https://images.unsplash.com/photo-1497366754035-f200968a6e72?w=1200&q=75&auto=format&fit=crop",
  court_case:     "https://images.unsplash.com/photo-1636652966850-5ac4d02370e9?w=1200&q=75&auto=format&fit=crop",
  steady_decline: "https://images.unsplash.com/photo-1510017803434-a899398421b3?w=1200&q=75&auto=format&fit=crop",
  decline:        "https://images.unsplash.com/photo-1601760687566-245dc579a297?w=1200&q=75&auto=format&fit=crop",
  ask_terms:      "https://images.unsplash.com/photo-1763729805496-b5dbf7f00c79?w=1200&q=75&auto=format&fit=crop",
  organize:       "https://images.unsplash.com/photo-1722156465633-0be603df7f8c?w=1200&q=75&auto=format&fit=crop"
};

const story = {
  start: {
    title: "Monday Morning",
    body: [
      "It's Monday morning. You've been at Peel Health for two and a half years. Long enough to know the coffee machine and the HR email patterns, not long enough to feel settled.",
      "Your manager, Linda, drops a glossy packet on your desk. \"New wellness initiative,\" she says. \"Completely optional.\" Her smile suggests otherwise.",
      "Inside the packet: a Fitbit Charge 6. Enroll in the PeelWell program and you get $50 a month off your health premium. All you have to do is wear the watch and hit \"reasonable activity goals.\" The fine print uses the phrase <em>data sharing with program administrators</em>.",
      "Linda is waiting for an answer."
    ],
    choices: [
      { text: "Sign up. $50 is $50.", go: "accept" },
      { text: "Pass. You already have a watch.", go: "decline" },
      { text: "Ask to read the full data agreement first.", go: "ask_terms" }
    ]
  },

  accept: {
    title: "Three Weeks In",
    body: [
      "You sign the form. The Fitbit comes in two days.",
      "The first few weeks are kind of fun. You hit your step goal most days. The little buzz when you close your activity ring feels good. You start parking farther from the building. You take stairs you never took before.",
      "A month in, Linda stops by your desk. \"Rough night?\" she asks, nodding at your wrist. \"Looks like you only got four hours.\"",
      "You didn't tell her that. The watch did."
    ],
    choices: [
      { text: "Laugh it off. She's being friendly.", go: "ignore" },
      { text: "Tell Linda that felt like an overstep.", go: "confront" },
      { text: "Start leaving the watch on your ceiling fan overnight.", go: "game" }
    ]
  },

  ignore: {
    title: "Six Months Later",
    body: [
      "You laugh. \"Late-night Netflix,\" you say. Linda nods.",
      "Over the next few months, the comments pile up. Your step count comes up in team stand-ups. Someone jokes about \"cardio slackers\" in the Slack channel. HR sends an email congratulating the \"top movers of Q3,\" names attached.",
      "Then, in March, you miss a sleep target two weeks in a row. Your spouse has been sick. You've been up at three a.m.",
      "An email from HR arrives: <em>PeelWell Check-In: Mandatory.</em> Your $50 premium discount is on hold pending the meeting. The email notes that missed sleep targets \"correlate with elevated cardiovascular risk indicators.\"",
      "You read it three times."
    ],
    choices: [
      { text: "Quit. This isn't worth it.", go: "clean_break" },
      { text: "Hire a lawyer and push back.", go: "court_case" },
      { text: "Go to the meeting. Keep the watch on.", go: "steady_decline" }
    ]
  },

  confront: {
    title: "The Thin Apology",
    ending: true,
    tone: "uncertain",
    body: [
      "You tell Linda the comment felt like a lot. She looks startled, then apologetic. \"I didn't mean it like that,\" she says. \"It's just, the dashboard shows all of us. I thought it was, you know, casual.\"",
      "The dashboard.",
      "You didn't know there was a dashboard.",
      "Linda promises not to mention your data again. But the data is still going somewhere. It's just that now you know it is, and she knows you know, and nothing else about the arrangement has changed.",
      "You keep the watch on. It gets easier not to think about."
    ],
    tags: "Empathy · Character"
  },

  game: {
    title: "The Fraud Charge",
    ending: true,
    tone: "dystopic",
    body: [
      "You start leaving the Fitbit on your ceiling fan at night. Steady rotational movement registers as \"active minutes.\" You're hitting your goals. You feel a little clever.",
      "Seven weeks in, you get a message from PeelWell Compliance. The platform flagged \"non-physiological motion patterns.\" You had signed something, buried on page 34, agreeing not to \"manipulate, simulate, or misrepresent biometric data.\"",
      "The word your HR rep uses, in the meeting, is <em>fraud</em>.",
      "Your termination is for cause. You don't qualify for unemployment. A background-check company now has your Fitbit data linked to the word."
    ],
    tags: "Fairness · Authority"
  },

  clean_break: {
    title: "Clean Break",
    ending: true,
    tone: "positive",
    body: [
      "You put in your two weeks that Friday. Your severance is thin. You freelance for six months and it's stressful, but nobody asks about your sleep.",
      "Your next job has no wellness program. You still wear a Fitbit sometimes, but just the step counter now, not linked to anything. You own your data again, which turns out to be a strange thing to have had to reclaim.",
      "Sometimes, when an article about employer wellness programs shows up in your feed, you feel a small, unaccountable relief."
    ],
    tags: "Liberty · Authority"
  },

  court_case: {
    title: "The Case",
    ending: true,
    tone: "uncertain",
    body: [
      "You find a lawyer who thinks the case has legs. Peel's data-sharing clause is sloppy. ERISA has gaps. Eighteen months of depositions later, you walk away with a settlement and an NDA.",
      "You can't talk about what happened. You can't post about it. Your old industry has a short memory for names, but a long memory for <em>difficult</em>. You get a new job. You don't trust them yet.",
      "You won. Probably. It's hard to say."
    ],
    tags: "Rights · Responsibilities"
  },

  steady_decline: {
    title: "The Steady Decline",
    ending: true,
    tone: "dystopic",
    body: [
      "The check-in goes fine. You explain. They note it. Your discount comes back.",
      "A year later, Peel rolls out PeelWell 2.0. Heart rate variability. Stress metrics. The watch stays on during performance reviews now. \"Don't worry,\" HR writes, \"elevated readings aren't used against you.\" Everyone knows what <em>used against you</em> is doing in that sentence.",
      "Your next employer, two years after that, asks for your wellness history during onboarding. It's standard now. You click share.",
      "You stop noticing the watch. That is, in its way, the point."
    ],
    tags: "Authority · Outcomes"
  },

  decline: {
    title: "The Quiet Cost",
    ending: true,
    tone: "uncertain",
    body: [
      "You tell Linda thanks, but no. She says \"totally fine,\" in the tone people use when something is, in fact, being noted.",
      "Months pass. The PeelWell folks get premium discounts. You don't. In your annual review, Linda mentions \"team engagement.\" Twice. You get passed over for a promotion in Q3. You can't prove it's because of the watch, but you're fairly sure.",
      "You stay anyway. You pay full premiums. You sleep well, in every sense.",
      "Two years later, a PeelWell data breach exposes eighty thousand employees' sleep, stress, and heart-rate data to the open internet. You are not on the list.",
      "It is possibly the most satisfying email you have ever deleted."
    ],
    tags: "Liberty · Responsibilities"
  },

  ask_terms: {
    title: "Section 8.3.b",
    body: [
      "You ask HR to send the full agreement. The PDF is forty-seven pages. You read it.",
      "Section 8.3.b: <em>Peel Health may share de-identified, aggregated biometric data with affiliated partners, including underwriting entities, for the purpose of improving benefits design.</em>",
      "De-identified. Aggregated. Affiliated partners. Underwriting.",
      "You read it again.",
      "You bring it up in the kitchen. Two coworkers look uncomfortable. One says, \"oh, I didn't read that part.\" Another says, \"I mean, they probably already have our data.\""
    ],
    choices: [
      { text: "Bring it to HR as a group.", go: "organize" },
      { text: "Quietly decline and move on.", go: "decline" }
    ]
  },

  organize: {
    title: "Something You Did",
    ending: true,
    tone: "positive",
    body: [
      "You find six colleagues willing to sign a letter. You keep it professional. Concerns about clause 8.3.b. A request for clarification. A suggestion that enrollment be truly opt-in with a clear data map.",
      "HR meets with you. Twice. The second time, they bring a VP. The program gets amended: no underwriting partners, a clear list of what is collected, and an opt-out that doesn't affect premiums.",
      "You become, informally, the person people ask about these things. Three other departments copy your template. Linda, to her credit, tells you she's glad you did it. She says she didn't know.",
      "You're not sure you believe her. But the program is better. And you did that."
    ],
    tags: "Authority · Empathy · Fairness"
  }
};

const TONE_LABEL = {
  positive: "A Positive Ending",
  uncertain: "An Uncertain Ending",
  dystopic: "A Dystopic Ending"
};

const app = document.getElementById("app");

function render(nodeKey) {
  const node = story[nodeKey];
  if (!node) return;
  const isEnding = !!node.ending;
  const photo = PHOTO[nodeKey];

  let html = `<article class="scene">`;
  if (photo) {
    html += `<div class="photo" style="background-image: url('${photo}')"></div>`;
  }
  html += `<div class="body">`;
  if (isEnding) {
    html += `<div class="ending-title">${TONE_LABEL[node.tone] || "An Ending"}</div>`;
  }
  html += `<h2>${node.title}</h2>`;
  node.body.forEach(p => { html += `<p>${p}</p>`; });

  if (isEnding) {
    html += `<div class="ending-meta">${node.tags}</div>`;
    html += `
      <div class="ending-actions">
        <button onclick="restart()">Start over</button>
        <button class="secondary" onclick="showReflection()">Read the reflection</button>
      </div>
    `;
  } else if (node.choices) {
    html += `<ul class="choices">`;
    node.choices.forEach(c => {
      html += `<li><button onclick="choose('${c.go}')">${c.text}</button></li>`;
    });
    html += `</ul>`;
  }
  html += `</div></article>`;

  app.innerHTML = html;
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function choose(key) { render(key); }

function restart() { render("start"); }

function showReflection() {
  const html = `
    <article class="scene reflection">
      <div class="body">
        <div class="ending-title">Author's Reflection</div>
        <h2 style="margin-top:0;">Why I made this</h2>

        <p>I keep thinking about the 2015 Connecticut case. A guy told police an intruder had killed his wife and tied him up. Her Fitbit said she was still walking around the house long after he said she was dead, and that's what got him charged. The watch she had bought for herself, for personal reasons, ended up being a key witness in court. Nobody buys a fitness tracker planning for that.</p>

        <p>That case is kind of the origin story for this project. I don't really worry about Fitbit as a thing that tracks steps. I worry about what happens the second the data stops being yours. Because once it leaves your body it isn't really health data anymore. It's evidence in a case, or a signal to an underwriter, or a row in somebody's quarterly report. The question I actually care about isn't whether wearables are good or bad. It's what happens when you aren't the only one looking at the numbers they produce.</p>

        <h3>The story map</h3>

        <p>Every path from the opening choice, with ending tones marked.</p>

        <div class="tree">
          <ul>
            <li><span class="decision">Monday Morning</span>
              <ul>
                <li><span class="scene-link">Sign up → Three Weeks In</span>
                  <ul>
                    <li><span class="scene-link">Laugh it off → Six Months Later</span>
                      <ul>
                        <li><span class="end">Quit → Clean Break</span><span class="badge badge-positive">Positive</span></li>
                        <li><span class="end">Sue → The Case</span><span class="badge badge-uncertain">Uncertain</span></li>
                        <li><span class="end">Comply → The Steady Decline</span><span class="badge badge-dystopic">Dystopic</span></li>
                      </ul>
                    </li>
                    <li><span class="end">Confront Linda → The Thin Apology</span><span class="badge badge-uncertain">Uncertain</span></li>
                    <li><span class="end">Game the data → The Fraud Charge</span><span class="badge badge-dystopic">Dystopic</span></li>
                  </ul>
                </li>
                <li><span class="end">Pass → The Quiet Cost</span><span class="badge badge-uncertain">Uncertain</span></li>
                <li><span class="scene-link">Ask for terms → Section 8.3.b</span>
                  <ul>
                    <li><span class="end">Organise coworkers → Something You Did</span><span class="badge badge-positive">Positive</span></li>
                    <li><span class="merge">Decline quietly → merges into The Quiet Cost</span></li>
                  </ul>
                </li>
              </ul>
            </li>
          </ul>
        </div>

        <h3>Why I made it a game</h3>

        <p>I picked an interactive story on purpose. When reading an essay about employer surveillance they may nod and scroll. When they click "sign up, $50 is $50" in a browser and end up two clicks later looking at an HR email about their sleep data, the player somewhat feels the impact.</p>

        <p>The format is basically "stolen" from <em>Welcome to Vanguard Estates</em>. What that story does really well is make every choice feel reasonable when you make it and terrible by the end. I tried to do the same. None of the seven endings here happen because the player is reckless. They happen because the player acts as a rational human. They take the discount. They don't want to make a scene with their manager. They trust HR. They skip the 47-page PDF. Which is how most people operate.</p>

        <h3>Authority</h3>

        <p>Authority was the 8KQ I leaned on hardest in my recent discussion posts and labs and it's the framework that runs through this story too. Linda has authority over the player, but it's just role-based. She didn't build the wellness program, she just enforces it. HR's only real expertise is that they're the people who actually read the terms of service, which is kind of a weird claim to authority, but is still authority. Peel as a company has contractual authority, buried in a sentence about "de-identified aggregated biometric data." None of those feel clearly illegitimate on their own. That's the problem. It's when you stack them up that it starts to look like a lot of the player's life is being run by people whose right to run it was never really earned.</p>

        <p>The Organise ending is the only one where the player actually builds legitimate authority back, through coworkers and a letter. That wasn't an accident. We kept hitting this idea in class that position-based authority and expertise-based authority aren't the same thing, and that the real question is whether the authority was earned. Most of my endings let position-based authority win by default. The player has to actually do the work to get expertise-based.</p>

        <h3>What the branches are doing</h3>

        <p>There's a few ideas sitting underneath the branches that the story doesn't spell out. The Game the Data path is about what happens when a metric becomes a target. It stops being a useful metric, and people start gaming it. The brutal part of the Fitbit version is the company has already thought about gaming and written it into the TOS as fraud. A student cheating in an exam at least doesn't get anyone charged with a crime.</p>

        <p>The Steady Decline ending is about how fast surveillance stops feeling like surveillance. It's not the first time somebody notices the watch on your wrist during a performance review that bothers you, it's the fiftieth, when nobody notices anymore. Two years later it's just what onboarding looks like.</p>

        <p>The Case ending is about the gap wearables sit in. They collect data that looks medical but isn't treated as medical legally, so if something goes wrong the options are slow, uneven, and usually end in an NDA.</p>

        <h3>The one ending that's actually honest</h3>

        <p>The Quiet Cost is the ending most people would tell you is the right one. You opt out, you keep your data, you walk away. On paper that's the clean answer, the Liberty answer, the player keeps their autonomy.</p>

        <p>But the story doesn't let it off the hook. The player who picks that path pays full premiums every month and gets passed over for a promotion they probably should've gotten. They didn't do anything wrong. They just kept their data to themselves, and that turns out to cost real money. In 2026, privacy isn't the default anymore, it's basically a paid tier.</p>

        <p>That's the part I wanted to be honest about. Every ending in the story has a price tag. Clean Break costs you the job. Organise costs you time, and the political risk of being the person who started something. Even The Quiet Cost, which looks like the easy out, is quietly charging you every month forever. There's nowhere in this story you can land for free, and that's on purpose. If the game does its job, the player finishes one path, clicks back, tries another, and somewhere in that second click realises every door has a tax on it.</p>

        <div class="ending-actions">
          <button onclick="restart()">Start the story again</button>
        </div>
      </div>
    </article>
  `;
  app.innerHTML = html;
  window.scrollTo({ top: 0, behavior: "smooth" });
}

window.choose = choose;
window.restart = restart;
window.showReflection = showReflection;

render("start");
</script>
</body>
</html>
